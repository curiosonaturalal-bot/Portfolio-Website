<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy's Website</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <button class="hamburger-menu" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div class="header-center">
            <a class="home-link" href="index.html" aria-label="Home" title="Home">
                <img src="transparent_logo.png" alt="Andy's Logo" class="logo">
            </a>
            <h1 class="brand-name">Andy</h1>
        </div>

        <div class="header-right">
            <!-- Example Right-Hand Icons (Search, Bag, User) -->
            <button class="icon-btn search-btn" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="icon-btn bag-btn" aria-label="Cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </button>
            <button class="icon-btn user-btn" aria-label="Account">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </header>

    <nav class="side-menu">
        <ul>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About Andy</a></li>
            <li><a href="#">Health Tips</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main class="page-content">
        <!-- Leave this empty for you to write your paragraph -->
    </main>

    <script>
        const hamburgerBtn = document.querySelector('.hamburger-menu');
        const sideMenu = document.querySelector('.side-menu');

        // Toggle the side menu and hamburger animation
        hamburgerBtn.addEventListener('click', () => {
            hamburgerBtn.classList.toggle('active');
            sideMenu.classList.toggle('active');
        });

        // Close menu if user clicks outside of it
        document.addEventListener('click', (event) => {
            if (!sideMenu.contains(event.target) && !hamburgerBtn.contains(event.target) && sideMenu.classList.contains('active')) {
                hamburgerBtn.classList.remove('active');
                sideMenu.classList.remove('active');
            }
        });
    </script>
</body>

</html>
